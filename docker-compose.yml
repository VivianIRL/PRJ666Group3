services:
  backend:
    build: ./backend
    ports:
      - "5000:5000"  # This hyphen indicates the start of an array item
    environment:
      - PORT=5000
    env_file:
      - backend/.env
  frontend:
    build: ./frontend/SettleCAN-Client
    ports:
      - "3000:80"    # This hyphen indicates the start of an array item
    depends_on:
      - backend
    volumes:
    # This maps your local config file into the container
    - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    env_file:
      - ./frontend/SettleCAN-Client/.env