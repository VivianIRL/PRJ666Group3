name: Node.js CI Pipeline

# 1. Trigger the pipeline on pushes or pull requests to any branch except main
on: 
  push: 
    branches: 
      - '**' 
      - '!main' 
  pull_request:
    branches:
      - '**'
      - '!main'

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      # 2. Check out the repository code onto the GitHub runner
      - name: Checkout Code
        uses: actions/checkout@v4

      # 3. Set up the Node.js runtime environment
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      # 4. Install frontend dependencies
      - name: Install frontend dependencies
        working-directory: frontend/SettleCAN-Client
        run: npm ci

      # 5. Install backend dependencies
      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      # 6. Run ESLint on the frontend
      - name: Run Linter
        working-directory: frontend/SettleCAN-Client
        run: npm run lint --if-present

      # 7. Audit frontend packages for high/critical security flaws
      - name: Audit frontend dependencies
        working-directory: frontend/SettleCAN-Client
        run: npm audit --audit-level=high --omit=dev

      # 8. Run Semgrep Security Scan
      - name: Run Semgrep Security Scan
        run: |
          python3 -m pip install semgrep
          semgrep scan --config auto --error

      # 9. Run frontend test suite (vitest)
      - name: Run Tests
        working-directory: frontend/SettleCAN-Client
        run: npm test -- --run
        env:
          NODE_ENV: test